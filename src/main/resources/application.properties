server.port=8080

# Datasource (MySQL example)
spring.datasource.url=jdbc:mysql://localhost:3306/shmamsa_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT secret
jwt.secret=replace_this_with_a_long_random_secret_key_please
jwt.expiration-ms=86400000

# WhatsApp config (NOT USED ANYMORE)
whatsapp.api.url=https://graph.facebook.com/v19.0/PLACEHOLDER/messages
whatsapp.token=PLACEHOLDER_ACCESS_TOKEN

# ===============================
# Node.js WhatsApp API (REQUIRED)
# ===============================
node.whatsapp.url=http://localhost:3000
node.secret.key=MY_SUPER_SECRET_KEY_2025
