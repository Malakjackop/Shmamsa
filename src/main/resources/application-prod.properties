# ===============================
# Production profile
# Activate with: SPRING_PROFILES_ACTIVE=prod
# ===============================

# Supabase PostgreSQL (set these as Railway env vars)
# spring.datasource.url=${DATABASE_URL}
# spring.datasource.username=${DATABASE_USERNAME}
# spring.datasource.password=${DATABASE_PASSWORD}

# CORS - allow your Vercel frontend
app.cors.allowed-origins=${CORS_ORIGINS:https://*.vercel.app}

# Disable SQL init in production (seeders handle it)
spring.sql.init.mode=never

# Security: use secure cookies over HTTPS
app.cookie.secure=true

# JWT - override with a strong secret in production
# jwt.secret=${JWT_SECRET}

# Email - override with production email credentials
# spring.mail.username=${EMAIL_USERNAME}
# spring.mail.password=${EMAIL_PASSWORD}

# R2 - override with production credentials
# cloudflare.r2.enabled=true
# cloudflare.r2.account-id=${R2_ACCOUNT_ID}
# cloudflare.r2.access-key=${R2_ACCESS_KEY}
# cloudflare.r2.secret-key=${R2_SECRET_KEY}
