<p-toast></p-toast>

<div class="dashboard">
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="assets/images/church-logo.png" class="logo" />
      <h2>Deacons Family</h2>
      <p>St Mary Church – Omrania</p>
    </div>

    <ul class="menu">
      <li routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
        <i class="pi pi-home"></i> Dashboard
      </li>

      <ng-container *ngIf="isServantOrAbove(); else makhdomMenu">
        <li routerLink="/attendance" routerLinkActive="active"><i class="pi pi-check-square"></i> Attendance</li>
        <li routerLink="/family" routerLinkActive="active"><i class="pi pi-users"></i> Members of your family</li>
        <li *ngIf="isAminOsraOrAbove()" routerLink="/transfer-members" routerLinkActive="active"><i class="pi pi-send"></i> Transfer members</li>
      </ng-container>

      <ng-template #makhdomMenu>
        <li><i class="pi pi-chart-bar"></i> Grades</li>
        <li><i class="pi pi-pencil"></i> Assignments</li>
      </ng-template>

      <li routerLink="/profile" routerLinkActive="active"><i class="pi pi-user"></i> Profile</li>
      <li routerLink="/resources" routerLinkActive="active">
      <i class="pi pi-folder"></i> Resources </li>
      <li routerLink="/attendance-history">Attendance History</li>
      <li routerLink="/about" routerLinkActive="active"><i class="pi pi-info-circle"></i> About us</li>
      <li (click)="logout()"><i class="pi pi-sign-out"></i> Logout</li>
    </ul>
  </aside>

  <main class="main">
    <router-outlet></router-outlet>
  </main>
</div>
