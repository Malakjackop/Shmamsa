<div class="popup-container">
  <div class="popup-header">
    <span>مسح QR</span>
    <button class="close-btn" (click)="close()">✕</button>
  </div>
  <div class="scanner-wrapper" *ngIf="isBrowser; else ssrFallback">
    <zxing-scanner
      (scanSuccess)="onCodeResult($event)"
    ></zxing-scanner>
  </div>
  <ng-template #ssrFallback>
    <div class="ssr-placeholder">Loading camera...</div>
  </ng-template>
  <div class="popup-footer">
    <span class="hint">وجه الكاميرا نحو QR code</span>
  </div>
</div>
