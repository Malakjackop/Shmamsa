<p-toast position="top-left"></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="page">
  <h1>نقل الأعضاء</h1>

  <!-- ✅ AMIN_KHEDMA / DEVELOPER: choose transfer mode -->
  <div class="familyView" *ngIf="isAminKhedmaOrDev()">
    <label class="lbl">نوع النقل</label>
    <select class="select" [(ngModel)]="mode" (change)="onModeChange()">
      <option value="MAKHDOM">مخدومين</option>
      <option value="SERVANT">خدام</option>
    </select>
  </div>

  <!-- ✅ AMIN_KHEDMA / DEVELOPER: when MAKHDOM, choose which family to VIEW (servant registration list) -->
  <div class="familyView" *ngIf="isAminKhedmaOrDev() && mode === 'MAKHDOM'">
    <label class="lbl">عرض مخدومين</label>
    <select class="select" [(ngModel)]="selectedFamilyView" (change)="onFamilyViewChange()">
      <option *ngFor="let f of servantFamilies" [value]="f">{{f}}</option>
    </select>
  </div>

  <div class="actions">
    <button *ngIf="!selecting" pButton type="button" label="نقل" (click)="startTransfer()"></button>

    <ng-container *ngIf="selecting">
      <!-- ✅ Target family -->
      <div class="inlinePicker">
        <label class="lbl">إلى أسرة</label>

        <!-- AMIN_KHEDMA/DEV + MAKHDOM -> makhdom families list (A/B) -->
        <select class="select" *ngIf="isAminKhedmaOrDev() && mode === 'MAKHDOM'" [(ngModel)]="targetFamily">
          <option *ngFor="let f of makhdomFamilies" [value]="f">{{f}}</option>
        </select>

        <!-- AMIN_KHEDMA/DEV + SERVANT -> servant families list (base) -->
        <select class="select" *ngIf="isAminKhedmaOrDev() && mode === 'SERVANT'" [(ngModel)]="targetFamily">
          <option *ngFor="let f of servantFamilies" [value]="f">{{f}}</option>
        </select>

        <!-- AMIN_OSRA -> makhdom families list (A/B) -->
        <select class="select" *ngIf="!isAminKhedmaOrDev()" [(ngModel)]="targetFamily">
          <option *ngFor="let f of makhdomFamilies" [value]="f">{{f}}</option>
        </select>
      </div>

      <!-- ✅ Target role (only in SERVANT mode for AMIN_KHEDMA/DEV) -->
      <div class="inlinePicker" *ngIf="isAminKhedmaOrDev() && mode === 'SERVANT'">
        <label class="lbl">إلى دور</label>
        <select class="select" [(ngModel)]="targetRole">
          <option value="KHADIM">خادم</option>
          <option value="AMIN_OSRA">أمين أسرة</option>
          <option value="AMIN_KHEDMA">أمين خدمة</option>
        </select>
      </div>

      <button pButton type="button" label="نقل" (click)="doTransfer()"></button>
      <button pButton type="button" class="p-button-secondary" label="إلغاء" (click)="cancelSelecting()"></button>
      <span class="selHint">المحدد: {{selectedIds.size}}</span>
    </ng-container>
  </div>

  <div *ngIf="loading" class="hint">جاري التحميل...</div>

  <div class="tableWrap" *ngIf="!loading">
    <table class="tbl">
      <thead>
        <tr>
          <th *ngIf="selecting">اختيار</th>
          <th>الاسم</th>
          <th>الدور</th>
          <th>الأسرة</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let m of members">
          <td *ngIf="selecting" class="checkCell">
            <input type="checkbox" [checked]="selectedIds.has(m.id)" (change)="toggleMember(m.id, $any($event.target).checked)" />
          </td>
          <td>{{m.fullName}}</td>
          <td>{{m.role}}</td>
          <td>{{m.deaconFamily}}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
