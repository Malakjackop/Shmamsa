<p-toast position="top-left"></p-toast>

<div class="login-wrapper">
  <div class="login-container">
    <div class="login-header">
      <img src="assets/images/church-logo.png" alt="شعار الكنيسة" class="logo">
      <h1>استعادة كلمة المرور</h1>
      <p>اكتب الإيميل ثم ارسل الكود وبعدها ادخل الكود وكلمة المرور الجديدة.</p>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <div class="input-group email-with-action">
        <input type="email" formControlName="email" placeholder="البريد الإلكتروني" required />
        <button
          type="button"
          class="send-code-btn"
          [disabled]="emailControl?.invalid || isSendingCode"
          (click)="sendCode()">
          {{ isSendingCode ? 'جاري الإرسال...' : 'إرسال كود' }}
        </button>
      </div>

      <div class="input-group">
        <input type="text" formControlName="token" placeholder="الكود المرسل على الإيميل" required />
      </div>

      <div class="input-group password-group">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="newPassword" placeholder="كلمة المرور الجديدة" required />
        <span class="password-eye" (click)="showPassword = !showPassword">
          <i class="fa" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </span>
      </div>

      <button type="submit" class="login-btn">تحديث كلمة المرور</button>

      <div class="links">
        <a routerLink="/login">العودة لتسجيل الدخول</a>
      </div>
    </form>
  </div>
</div>
