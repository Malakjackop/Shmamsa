<p-toast></p-toast>

<div class="login-wrapper">
  <div class="login-container">
    <div class="login-header">
      <img src="assets/images/church-logo.png" alt="شعار الكنيسة" class="logo">
      <h1>نسيت كلمة المرور</h1>
      <p>اكتب بريدك الإلكتروني لاستلام كود إعادة التعيين.</p>
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      <div class="input-group">
        <input type="email" formControlName="email" placeholder="البريد الإلكتروني" required />
      </div>

      <button type="submit" class="login-btn">إرسال كود إعادة التعيين</button>

      <div class="links">
        <a routerLink="/login">العودة لتسجيل الدخول</a>
      </div>
    </form>
  </div>
</div>
