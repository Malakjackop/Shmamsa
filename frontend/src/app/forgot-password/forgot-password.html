<div class="login-wrapper">
  <div class="login-container">
    <div class="login-header">
      <img src="assets/images/church-logo.png" alt="Church Logo" class="logo">
      <h1>Forgot Password</h1>
      <p *ngIf="step === 1">Enter your phone or guardian’s phone number.</p>
      <p *ngIf="step === 2">Select which user account to reset.</p>
    </div>

    <!-- Step 1: Enter phone -->
    <form *ngIf="step === 1" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      <div class="input-group">
        <input type="text" formControlName="phoneNumber" placeholder="Phone or Guardian's Phone" required />
      </div>
      <button type="submit" class="login-btn">SEND RESET CODE</button>
    </form>

    <!-- Step 2: Choose user if multiple -->
    <div *ngIf="step === 2">
      <div class="input-group">
      <label>Select User:</label>
      <select class="form-control" (change)="onSelectUser($any($event.target).value)">
        <option value="" disabled selected>Select</option>
        <option *ngFor="let u of multipleUsers" [value]="u.username">
          {{ u.fullName }} ({{ u.deaconFamily }})
        </option>
      </select>
    </div>

      <a routerLink="/login" class="links">Back to Login</a>
    </div>

    <p-toast></p-toast>
  </div>
</div>
