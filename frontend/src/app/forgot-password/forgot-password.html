<p-toast position="top-left"></p-toast>

<div class="login-wrapper">
  <div class="login-container">
    <div class="login-header">
      <img src="assets/images/church-logo.png" alt="شعار الكنيسة" class="logo">
      <h1>استعادة كلمة المرور</h1>
    </div>

    <!-- STEP 1: كتابة الرقم -->
    <div *ngIf="step === 1">
      <p class="hint">اكتب رقم تليفونك المسجل في الأبليكيشن.</p>

      <div class="input-group">
        <input
          type="tel"
          [(ngModel)]="phoneNumber"
          placeholder="رقم الهاتف (01XXXXXXXXX)"
          maxlength="11" />
      </div>

      <button class="login-btn" [disabled]="isSending" (click)="requestWaCode()">
        {{ isSending ? 'جاري التحقق...' : 'التالي' }}
      </button>
    </div>

    <!-- STEP 2: فتح واتساب وإرسال الكود -->
    <div *ngIf="step === 2">
      <p class="hint">
        اضغط الزرار، هيفتح واتساب والرسالة جاهزة بالكود.<br>
        بس اضغط <strong>إرسال</strong> وهييجيلك الـ OTP.
      </p>

      <button class="whatsapp-btn" (click)="openWhatsApp()">
        💬 فتح واتساب وإرسال الكود
      </button>

      <p class="hint" style="margin-top: 16px; color: #e67e22;">
        ⏱ الكود صالح لمدة 10 دقائق فقط
      </p>

      <div class="input-group" style="margin-top: 20px;">
        <input
          type="text"
          [(ngModel)]="otp"
          placeholder="الـ OTP اللي جالك على واتساب"
          maxlength="5" />
      </div>

      <div class="input-group password-group">
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="newPassword"
          placeholder="كلمة المرور الجديدة" />
        <span class="password-eye" (click)="showPassword = !showPassword">
          <i class="fa" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </span>
      </div>

      <button class="login-btn" (click)="resetPassword()">تحديث كلمة المرور</button>

      <button class="back-btn" (click)="step = 1">← رجوع</button>
    </div>

    <div class="links">
      <a routerLink="/login">العودة لتسجيل الدخول</a>
    </div>
  </div>
</div>
