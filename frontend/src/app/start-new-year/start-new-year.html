<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="page">
  <h1>بدء سنة جديدة</h1>

  <div class="card" *ngIf="isAllowed(); else forbidden">

    <button
      pButton
      type="button"
      label="بدء سنة جديدة (تصفير الحضور للجميع)"
      styleClass="p-button-danger"
      [disabled]="running"
      (click)="startNewYear()"
    ></button>

    <div *ngIf="running" class="hint">جاري التنفيذ...</div>
  </div>

  <ng-template #forbidden>
    <div class="card">
      <p class="hint"></p>
    </div>
  </ng-template>
</div>
