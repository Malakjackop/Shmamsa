<div class="login-wrapper">
  <div class="login-container">
    <div class="login-header">
      <img src="assets/images/church-logo.png" alt="Church Logo" class="logo">
      <h1>Reset Password</h1>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <div class="input-group">
        <input type="text" formControlName="token" placeholder="RESET TOKEN" required />
      </div>

      <div class="input-group password-group">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="newPassword" placeholder="NEW PASSWORD" required />
        <span class="password-eye" (click)="showPassword = !showPassword">
          <i class="fa" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </span>
      </div>

      <button type="submit" class="login-btn">RESET PASSWORD</button>

      <div class="links">
        <a routerLink="/login">Back to Login</a>
      </div>
    </form>

    <p-toast></p-toast>
  </div>
</div>
