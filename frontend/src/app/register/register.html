<div class="login-wrapper">
  <div class="login-container">
    <div class="login-header">
      <img src="assets/images/church-logo.png" alt="Church Logo" class="logo" />
      <h1>DEACONS FAMILY <br />St Mary Church - Omrania</h1>
    </div>

    <!-- ✅ PrimeNG Toast -->
    <p-toast position="top-right"></p-toast>

    <form [formGroup]="registerForm" class="login-form" (ngSubmit)="submit()">
      <!-- Row 1 -->
      <div class="input-row">
        <div class="input-group small">
          <input type="text" formControlName="fullName" placeholder="Full Name" required (blur)="onFieldBlur('fullName', 'Full Name')" />
        </div>

        <div class="input-group small">
          <input type="text" formControlName="username" placeholder="USERNAME" required (blur)="onFieldBlur('username', 'Username')" />
        </div>

        <div class="input-group small">
          <input type="text" formControlName="phoneNumber" placeholder="PHONE NUMBER" />
        </div>

        <div class="input-group small">
          <input type="text" formControlName="address" placeholder="ADDRESS" />
        </div>

        <div class="input-group small">
          <input type="text" formControlName="nationalId"  name="national-id" autocomplete="off" placeholder="NATIONAL ID" (blur)="onNationalIdBlur(); onFieldBlur('nationalId', 'National ID')" />
        </div>

        <div class="input-group small">
  <input type="email" formControlName="email" placeholder="EMAIL" required (blur)="onFieldBlur('email', 'Email')" />
</div>


        <div class="input-group small">
          <input type="date" formControlName="dateOfBirth" placeholder="DATE OF BIRTH" [readonly]="true"    autocomplete="off"
                 (keydown)="$event.preventDefault()"
                 (click)="$event.preventDefault()" />
        </div>

        <div class="input-group small">
          <input type="text" formControlName="gender" placeholder="GENDER" [readonly]="true" autocomplete="off"
                  (keydown)="$event.preventDefault()"
                 (click)="$event.preventDefault()" />
        </div>
      </div>
      <!-- ✅ Deacon Family + Degree -->
      <div class="input-row">
        <!-- Deacon Family -->
        <div class="input-group small">
          <select formControlName="deaconFamily" required (blur)="onFieldBlur('deaconFamily', 'Deacon Family')">
  <option value="" disabled>What's your Deacon Family?</option>

  <option value="اسرة السمائين">اسرة السمائين</option>
  <option value="اسرة القديس ابانوب">اسرة القديس ابانوب</option>
  <option value="اسرة القديس ديسقورس">اسرة القديس ديسقورس</option>
  <option value="اسرة القديس سيدهم بشاي">اسرة القديس سيدهم بشاي</option>
  <option value="اسرة القديس  اسكلابيوس">اسرة القديس اسكلابيوس</option>
  
  <ng-container *ngIf="isServant; else makhdomFamilies">
    <option value="اسرة القديس البابا كيرلس">اسرة القديس البابا كيرلس</option>
    <option value="اسرة القديس الانبا ابرام">اسرة القديس الانبا ابرام</option>
  </ng-container>
  
  <ng-template #makhdomFamilies>
    <option value="اسرة القديس البابا كيرلس أ">اسرة القديس البابا كيرلس ( أ )</option>
    <option value="اسرة القديس البابا كيرلس ب">اسرة القديس البابا كيرلس ( ب )</option>
    <option value="اسرة القديس الانبا ابرام أ">اسرة القديس الانبا ابرام ( أ )</option>
    <option value="اسرة القديس الانبا ابرام ب">اسرة القديس الانبا ابرام ( ب )</option>
  </ng-template>
  <option value="اسرة القديس  اسطفانوس">اسرة القديس اسطفانوس</option>
</select>

        </div>

        <!-- ✅ Deacon Degree -->
        <div class="input-group small">
          <select formControlName="deaconDegree" required (blur)="onFieldBlur('deaconDegree', 'Deacon Degree')">
            <option value="" disabled>What's your Deacon Degree?</option>
            <option>ابصالتس</option>
            <option>اغنسطس</option>
            <option>ايبودياكون</option>
            <option>دياكون</option>
            <option>ارشي دياكون</option>
          </select>
        </div>
      </div>

      <!-- Status -->
      <div class="input-row">
        <div class="input-group small">
          <select formControlName="status" (change)="onStatusChange()">
            <option value="" disabled>Choose Status</option>
            <option value="student">Student</option>
            <option value="graduate">Graduate</option>
          </select>
        </div>
      </div>

      <!-- Graduate Section -->
      <div *ngIf="registerForm.get('status')?.value === 'graduate'" class="input-row">
        <div class="input-group small">
          <input type="text" formControlName="graduatedFrom" placeholder="Graduated From (e.g., University Name)" />
        </div>

        <div class="input-group small">
          <input type="text" formControlName="graduateJob" placeholder="Current Job" />
        </div>
      </div>

      <!-- Student Section -->
      <div *ngIf="registerForm.get('status')?.value === 'student'">
        <!-- Study Type -->
        <div class="input-row">
          <div class="input-group small">
            <select formControlName="studyType" (change)="onStudyTypeChange()">
              <option value="" disabled>Study In</option>
              <option value="school">School</option>
              <option value="university">University</option>
            </select>
          </div>
        </div>

        <!-- School Section -->
        <div *ngIf="registerForm.get('studyType')?.value === 'school'" class="input-row">
          <div class="input-group small">
            <input type="text" formControlName="schoolName" placeholder="School Name" />
          </div>

          <div class="input-group small">
          <select class="form-select" formControlName="schoolGrade" >
            <option value="" disabled>اختر الصف</option>
            <option value="grade1_primary">أولى ابتدائي</option>
            <option value="grade2_primary">تانية ابتدائي</option>
            <option value="grade3_primary">تالتة ابتدائي</option>
            <option value="grade4_primary">رابعة ابتدائي</option>
            <option value="grade5_primary">خامسة ابتدائي</option>
            <option value="grade6_primary">سادسة ابتدائي</option>

            <option value="grade1_prep">أولى إعدادي</option>
            <option value="grade2_prep">تانية إعدادي</option>
            <option value="grade3_prep">تالتة إعدادي</option>

            <option value="grade1_secondary">أولى ثانوي</option>
            <option value="grade2_secondary">تانية ثانوي</option>
            <option value="grade3_secondary">تالتة ثانوي</option>
            <option value="other">أخر</option>
          </select>
          </div>
            <div class="input-group small" *ngIf="showOtherGrade">
              <input type="text"
                    formControlName="otherGrade"
                    placeholder="اكتب الصف الدراسي" />
            </div>

        </div>

        <!-- University Section -->
        <div *ngIf="registerForm.get('studyType')?.value === 'university'" class="input-row">
          <div class="input-group small">
            <input type="text" formControlName="universityName" placeholder="University Name" />
          </div>

          <div class="input-group small">
            <input type="text" formControlName="faculty" placeholder="Faculty" />
          </div>

          <div class="input-group small">
            <input type="text" formControlName="universityGrade" placeholder="Year/Level" />
          </div>
        </div>

        <!-- Work Info -->
        <div class="input-row">
          <div class="input-group small">
          <select formControlName="isWorking">
            <option value="" disabled>Do you work?</option>
            <option [ngValue]="false">No</option>
            <option [ngValue]="true">Yes</option>
          </select>
          </div>
        </div>

        <div *ngIf="registerForm.get('isWorking')?.value === 'yes'" class="input-row">
          <div class="input-group small">
            <input type="text" formControlName="workDetails" placeholder="What is your job?" />
          </div>
        </div>

        <!-- Guardian (only for students in SCHOOL) -->
        <div *ngIf="registerForm.get('studyType')?.value === 'school'" class="input-row">
          <div class="input-group small">
            <input type="text" formControlName="guardiansPhone" placeholder="Guardian Phone" required />
          </div>

          <div class="input-group small">
            <select formControlName="guardianRelation">
              <option value="" disabled>Who is the Guardian?</option>
              <option value="mom">Mom</option>
              <option value="dad">Dad</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Password Section -->
      <div class="input-row">
        <div class="input-group small password-group">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="PASSWORD"
            required (blur)="onFieldBlur('password', 'Password')" />
          <span class="password-eye" (click)="togglePassword()">
            <i class="fa" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </span>
        </div>

        <div class="input-group small password-group">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder="CONFIRM PASSWORD"
            required (blur)="onFieldBlur('confirmPassword', 'Confirm Password')" />
          <span class="password-eye" (click)="toggleConfirmPassword()">
            <i class="fa" [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </span>
        </div>
      </div>
      <div class="input-group" *ngIf="isServant">
        <label for="secret">Secret</label>
        <input id="secret" type="password" formControlName="secret" placeholder="Enter secret" />
        <small class="error" *ngIf="registerForm.get('secret')?.touched && registerForm.get('secret')?.invalid">
          Secret is required.
        </small>
      </div>


      <button type="submit" class="login-btn">REGISTER</button>

      <div class="links">
        <a routerLink="/login">Already have an account? Login</a>
      </div>
    </form>
  </div>
</div>
