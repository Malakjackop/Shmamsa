<div class="attendance-history-page">
  <div class="attendance-history-header">
    <h1 class="page-title">حضوري</h1>
  </div>

  <div *ngIf="loading" class="page-state">جاري التحميل...</div>

  <div *ngIf="!loading && monthGroups.length === 0" class="page-state empty-state">
    لا يوجد سجل حضور حتى الآن.
  </div>

  <div *ngIf="!loading && monthGroups.length > 0" class="months-list">
    <section *ngFor="let group of monthGroups; trackBy: trackMonth" class="month-card">
      <button type="button" class="month-toggle" (click)="toggleMonth(group.key)">
        <span class="month-title">{{ group.title }}</span>

        <i
          class="pi month-icon"
          [class.pi-chevron-up]="isExpanded(group.key)"
          [class.pi-chevron-down]="!isExpanded(group.key)"
        ></i>
      </button>

      <div *ngIf="isExpanded(group.key)" class="month-content">
        <div
          *ngFor="let typeGroup of group.typeGroups; let isLast = last; trackBy: trackTypeGroup"
          class="type-block"
          [class.no-divider]="isLast"
        >
          <table class="history-table">
            <colgroup>
              <col class="col-event" />
              <col class="col-status" />
              <col class="col-servant" />
              <col class="col-time" />
            </colgroup>

            <thead *ngIf="typeGroup === group.typeGroups[0]">
              <tr>
                <th>المناسبة</th>
                <th>الحالة</th>
                <th>الخادم</th>
                <th>اليوم</th>
              </tr>
            </thead>

            <tbody>
              <tr
                *ngFor="let row of typeGroup.rows; trackBy: trackRow"
                [class.absent-row]="row.status === 'ABSENT'"
              >
                <td class="event-cell">
                  <div class="event-name">{{ row.customTitle || labelType(row.type) }}</div>
                  <div class="event-time">{{ formatTime12h(row.time) }}</div>
                </td>
                <td class="status-cell">{{ labelStatus(row.status) }}</td>
                <td class="servant-cell">{{ row.takenBy || '-' }}</td>
                <td class="time-cell">{{ formatDate(row.date) }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
</div>
