<div class="about-container">
  <h1 class="about-title"> سجل حضوري </h1>

  <div *ngIf="loading" class="about-subtitle">جاري التحميل...</div>

  <div *ngIf="!loading && filteredItems.length === 0" class="about-subtitle">
    لا يوجد سجل حضور حتى الآن.
  </div>

  <table *ngIf="!loading && filteredItems.length > 0" class="history-table">
    <thead>
      <tr>
        <th>التاريخ</th>
        <th>الوقت</th>
        <th>النوع</th>
        <th>الحالة</th>
        <th>الخادم الي سجلك الغياب</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let it of filteredItems">
        <td>{{ it.date }}</td>
        <td class="time-cell">{{ formatTime12h(it.time) }}</td>
        <td>{{ labelType(it.type) }}</td>
        <td>{{ labelStatus(it.status) }}</td>
        <td>{{ it.takenBy || '-' }}</td>
      </tr>
    </tbody>
  </table>
</div>
