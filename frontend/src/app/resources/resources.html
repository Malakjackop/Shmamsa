<p-toast position="top-left"></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="page">
  <h1>الموارد</h1>

  <div class="top" *ngIf="isAminKhedmaOrDev()">
    <label>الأسرة</label>
    <select [(ngModel)]="selectedFamily" (change)="loadResources()">
      <option *ngFor="let f of families" [value]="f">{{ f }}</option>
    </select>

    <small class="hint" *ngIf="selectedFamily === 'ALL'">
      اختيار ALL لن يعرض قائمة، لكن الملفات التي ترفعها ستكون متاحة لكل الأسر.
    </small>
  </div>

  <div class="upload" *ngIf="isUploader()">
    <h3>رفع ملفات</h3>

    <div class="row">
      <input type="text" [(ngModel)]="title" placeholder="العنوان (اختياري)" />
      <input type="text" [(ngModel)]="description" placeholder="الوصف (اختياري)" />
    </div>

    <div class="row">
      <input type="file" (change)="onPickFile($event)" />
      <button pButton type="button" label="رفع" (click)="upload()"></button>
    </div>
  </div>

  <div class="card">
    <h3>الملفات</h3>

    <div *ngIf="resources.length === 0" class="empty">
      لا توجد ملفات.
    </div>

    <table *ngIf="resources.length > 0">
      <thead>
        <tr>
          <th>العنوان</th>
          <th>الملف</th>
          <th>الأسرة</th>
          <th>تم الرفع بواسطة</th>
          <th style="width: 280px;">إجراءات</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let r of resources">
          <td>{{ r.title || '-' }}</td>
          <td>{{ r.originalName }}</td>
          <td>{{ r.family }}</td>
          <td>{{ r.uploadedByUsername }}</td>
          <td class="actions">
            <button pButton type="button" label="تحميل" (click)="download(r)"></button>

            <ng-container *ngIf="!isMakhdom() && isUploader()">
              <button pButton type="button" label="تعديل" (click)="openEdit(r)"></button>
              <button pButton type="button" label="حذف" (click)="remove(r)"></button>
            </ng-container>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="edit" *ngIf="editing">
    <h3>تعديل ملف</h3>
    <div class="row">
      <input type="text" [(ngModel)]="editTitle" placeholder="العنوان" />
      <input type="text" [(ngModel)]="editDescription" placeholder="الوصف" />
    </div>
    <div class="row">
      <input type="file" (change)="onEditFile($event)" />
      <button pButton type="button" label="حفظ" (click)="saveEdit()"></button>
      <button pButton type="button" label="إلغاء" (click)="cancelEdit()"></button>
    </div>
  </div>
</div>
