
<p-toast></p-toast>

<div class="page">
  <h1>Attendance</h1>

  <div class="controls">
    <label>Event</label>
    <select [(ngModel)]="selectedType">
      <option value="FRIDAY_LITURGY">قداس الجمعة</option>
      <option value="TASBEEHA">تسبحة</option>
      <option value="FAMILY_MEETING">اجتماع الأسرة</option>
    </select>

    <p-button type="button" (onClick)="toggleScan()" [label]="scanning ? 'Stop Scan' : 'Scan QR'"></p-button>
  </div>

  <div class="scanner" *ngIf="scanning">
    <zxing-scanner (scanSuccess)="onCodeResult($event)"></zxing-scanner>
    <p class="hint">وجّه الكاميرا للـ QR.</p>
  </div>

  <h2>Scanned List</h2>

  <div class="list" *ngIf="scanned.length; else empty">
    <div class="row" *ngFor="let u of scanned">
      <div>
        <div class="name">{{u.fullName}}</div>
        <div class="sub" *ngIf="u.deaconFamily">{{u.deaconFamily}}</div>
      </div>
      <p-button type="button" icon="pi pi-times" (onClick)="remove(u.id)"></p-button>
    </div>

    <p-button type="button" class="submit" (onClick)="submit()" label="Submit"></p-button>
  </div>

  <ng-template #empty>
    <p class="hint">لسه مفيش حد اتعمله Scan.</p>
  </ng-template>
</div>
