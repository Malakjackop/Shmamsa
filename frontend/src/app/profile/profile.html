<p-toast position="top-left"></p-toast>

<header class="header profile-header">
  <div class="profile-title">
    <h2>👤 ملفي الشخصي</h2>
  </div>

  <div class="qr-section">
    <qrcode
      *ngIf="qrData"
      [qrdata]="qrData"
      [width]="180"
      [errorCorrectionLevel]="'M'"
      [allowEmptyString]="true">
    </qrcode>
  </div>
</header>

<section class="profile-container">
  <form [formGroup]="profileForm" (ngSubmit)="saveChanges()">
    <div class="form-grid">
      <div>
        <label>الاسم بالكامل</label>
        <input formControlName="fullName" />
      </div>

      <div>
        <label>البريد الإلكتروني</label>
        <input formControlName="email" />
      </div>

      <div>
        <label>رقم الهاتف</label>
        <input formControlName="phoneNumber" />
      </div>

      <div>
        <label>العنوان</label>
        <input formControlName="address" />
      </div>

      <div>
        <label>هاتف ولي الأمر</label>
        <input formControlName="guardiansPhone" />
      </div>

      <div>
        <label>صلة القرابة</label>
        <select formControlName="guardianRelation">
          <option value="">اختر صلة القرابة</option>
          <option *ngFor="let opt of guardianRelationOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </div>

      <div>
        <label>الأسرة</label>
        <input formControlName="deaconFamily" />
      </div>

      <div>
        <label>رتبة الشماس</label>
        <select formControlName="deaconDegree">
          <option value="">اختر الرتبة</option>
          <option *ngFor="let d of deaconDegreeOptions" [value]="d">{{ d }}</option>
        </select>
      </div>

      <div>
        <label>الخورس</label>
        <select formControlName="khors">
          <option *ngFor="let kh of khorsOptions" [value]="kh.value">{{ kh.label }}</option>
        </select>
      </div>

      <div *ngIf="isMarmarkosKhors()">
        <label>سنة الخورس</label>
        <select formControlName="khorsYear">
          <option [ngValue]="null" disabled>اختر السنة</option>
          <option *ngFor="let y of khorsYearOptions" [ngValue]="y.value">{{ y.label }}</option>
        </select>
      </div>

      <div *ngIf="showStatusField()">
        <label>الحالة</label>
        <select formControlName="status">
          <option value="" disabled>اختر الحالة</option>
          <option value="student">طالب</option>
          <option value="graduate">خريج</option>
        </select>
      </div>

      <div *ngIf="!isGraduate()">
        <label>نوع الدراسة</label>
        <select formControlName="studyType">
          <option value="" disabled>اختر نوع الدراسة</option>
          <option *ngIf="canSelectSchoolOption()" value="school">مدرسة</option>
          <option value="university">جامعة</option>
        </select>
      </div>

      <div *ngIf="!isGraduate() && isSchool()">
        <label>اسم المدرسة</label>
        <input formControlName="schoolName" />
      </div>

      <div *ngIf="!isGraduate() && isSchool()">
        <label>الصف الدراسي</label>
        <input formControlName="schoolGrade" />
      </div>

      <div *ngIf="!isGraduate() && isUniversity()">
        <label>اسم الجامعة</label>
        <input formControlName="universityName" />
      </div>

      <div *ngIf="!isGraduate() && isUniversity()">
        <label>الكلية</label>
        <input formControlName="faculty" />
      </div>

      <div *ngIf="!isGraduate() && isUniversity()">
        <label>السنة/الفرقة</label>
        <input formControlName="universityGrade" />
      </div>

      <div *ngIf="isGraduate()">
        <label>تخرج من</label>
        <input formControlName="graduatedFrom" />
      </div>

      <div *ngIf="isGraduate()">
        <label>الوظيفة الحالية</label>
        <input formControlName="graduateJob" />
      </div>

      <div *ngIf="!isGraduate()" class="wide">
        <label>تفاصيل العمل</label>
        <input formControlName="workDetails" />
      </div>
    </div>

    <div class="buttons">
      <button type="button" class="edit-btn" (click)="toggleEdit()" *ngIf="!editMode">
        ✏️ تعديل الملف الشخصي
      </button>

      <button type="submit" class="save-btn" *ngIf="editMode">
        💾 حفظ التغييرات
      </button>

      <button type="button" class="cancel-btn" (click)="toggleEdit()" *ngIf="editMode">
        ❌ إلغاء
      </button>
    </div>
  </form>
</section>
