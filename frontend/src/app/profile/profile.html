<p-toast></p-toast>

<header class="header profile-header">
  <div class="profile-title">
    <h2>👤 My Profile</h2>
  </div>

  <div class="qr-section">
    <qrcode
      *ngIf="qrData"
      [qrdata]="qrData"
      [width]="180"
      [errorCorrectionLevel]="'M'"
      [allowEmptyString]="true">
    </qrcode>
  </div>
</header>

<section class="profile-container">
  <form [formGroup]="profileForm" (ngSubmit)="saveChanges()">
    <div class="form-grid">
      <div>
        <label>Full Name</label>
        <input formControlName="fullName" />
      </div>

      <div>
        <label>Phone Number</label>
        <input formControlName="phoneNumber" />
      </div>

      <div>
        <label>Guardian’s Phone</label>
        <input formControlName="guardiansPhone" />
      </div>

      <div>
        <label>Guardian Relation</label>
        <input formControlName="guardianRelation" />
      </div>

      <div>
        <label>Deacon Family</label>
        <input formControlName="deaconFamily" />
      </div>

      <div>
        <label>Deacon Degree</label>
        <input formControlName="deaconDegree" />
      </div>

      <div>
        <label>Status</label>
        <input formControlName="status" />
      </div>

      <div>
        <label>Study Type</label>
        <input formControlName="studyType" />
      </div>

      <div>
        <label>School Name</label>
        <input formControlName="schoolName" />
      </div>

      <div>
        <label>University Name</label>
        <input formControlName="universityName" />
      </div>

      <div>
        <label>Faculty</label>
        <input formControlName="faculty" />
      </div>

      <div>
        <label>University Grade</label>
        <input formControlName="universityGrade" />
      </div>

      <div class="wide">
        <label>Work Details</label>
        <input formControlName="workDetails" />
      </div>
    </div>

    <div class="buttons">
      <button type="button" class="edit-btn" (click)="toggleEdit()" *ngIf="!editMode">
        ✏️ Edit Profile
      </button>

      <button type="submit" class="save-btn" *ngIf="editMode">
        💾 Save Changes
      </button>

      <button type="button" class="cancel-btn" (click)="toggleEdit()" *ngIf="editMode">
        ❌ Cancel
      </button>
    </div>
  </form>
</section>
