<p-toast position="top-left"></p-toast>

<section class="profile-page" [class.editing]="editMode">
  <div class="profile-hero">
    <div class="hero-topbar">
      <button
        *ngIf="!editMode"
        type="button"
        class="icon-action-btn"
        (click)="toggleEdit()"
        aria-label="تعديل الملف الشخصي"
        title="تعديل الملف الشخصي"
      >
        <i class="pi pi-pencil"></i>
      </button>

      <div class="hero-actions" *ngIf="editMode">

        <button
          type="submit"
          class="icon-action-btn save-icon-btn"
          form="profileForm"
          aria-label="حفظ التعديلات"
          title="حفظ التعديلات"
        >
          <i class="pi pi-check"></i>
        </button>
        <button
          type="button"
          class="icon-action-btn cancel-icon-btn"
          (click)="toggleEdit()"
          aria-label="إلغاء التعديل"
          title="إلغاء التعديل"
        >
          <i class="pi pi-times"></i>
        </button>

      </div>
    </div>

    <div class="hero-content">
      <div class="profile-avatar">
        <img src="assets/images/profile.png" alt="الصورة الشخصية" />
      </div>

      <h1>{{ profileForm.get('fullName')?.value || user?.fullName || 'ملفي الشخصي' }}</h1>
    </div>
  </div>

  <section class="profile-card">
    <div
      class="tabs-row tabs-row--animated"
      [style.--active-index]="activeTab === 'personal' ? 0 : 1"
      [style.--tab-count]="2"
    >
      <button
        type="button"
        class="tab-btn"
        [class.active]="activeTab === 'personal'"
        (click)="activeTab = 'personal'"
      >
        بيانات شخصية
      </button>
      <button
        type="button"
        class="tab-btn"
        [class.active]="activeTab === 'other'"
        (click)="activeTab = 'other'"
      >
        بيانات أخرى
      </button>
    </div>

    <form id="profileForm" [formGroup]="profileForm" (ngSubmit)="saveChanges()">
      <div class="form-grid" *ngIf="activeTab === 'personal'">
        <div class="field-card" *ngIf="showProfileField('phoneNumber')">
          <label>رقم الهاتف</label>
          <input formControlName="phoneNumber" />
        </div>

        <div class="field-card" *ngIf="showProfileField('email')">
          <label>البريد الإلكتروني</label>
          <input formControlName="email" />
        </div>

        <div class="field-card field-wide" *ngIf="showProfileField('address')">
          <label>العنوان بالتفصيل</label>
          <input formControlName="address" />
        </div>

        <div class="field-card" *ngIf="showProfileField('guardiansPhone')">
          <label>موبايل ولي الأمر</label>
          <input formControlName="guardiansPhone" />
        </div>

        <div class="field-card" *ngIf="showProfileField('guardianRelation')">
          <label>صلة القرابة</label>
          <input formControlName="guardianRelation" />
        </div>

        <div class="field-card" *ngIf="showProfileField('deaconDegree')">
          <label>رتبة الشماس</label>
          <select formControlName="deaconDegree">
            <option value="">اختر الرتبة</option>
            <option *ngFor="let d of deaconDegreeOptions" [value]="d">{{ d }}</option>
          </select>
        </div>
      </div>

      <div class="form-grid" *ngIf="activeTab === 'other'">
        <div class="field-card" *ngIf="showStatusField() && showProfileField('status')">
          <label>الحالة</label>
          <select formControlName="status">
            <option value="" disabled>اختر الحالة</option>
            <option value="student">طالب</option>
            <option value="graduate">خريج</option>
          </select>
        </div>

        <div class="field-card" *ngIf="!isGraduate() && showProfileField('studyType')">
          <label>نوع الدراسة</label>
          <select formControlName="studyType">
            <option value="" disabled>اختر نوع الدراسة</option>
            <option *ngIf="canSelectSchoolOption()" value="school">مدرسة</option>
            <option value="university">جامعة</option>
          </select>
        </div>

        <div class="field-card" *ngIf="!isGraduate() && isSchool() && showProfileField('schoolName')">
          <label>اسم المدرسة</label>
          <input formControlName="schoolName" />
        </div>

        <div class="field-card" *ngIf="!isGraduate() && isSchool() && showProfileField('schoolGrade')">
          <label>الصف الدراسي</label>
          <input formControlName="schoolGrade" />
        </div>

        <div class="field-card" *ngIf="!isGraduate() && isUniversity() && showProfileField('universityName')">
          <label>اسم الجامعة</label>
          <input formControlName="universityName" />
        </div>

        <div class="field-card" *ngIf="!isGraduate() && isUniversity() && showProfileField('faculty')">
          <label>الكلية</label>
          <input formControlName="faculty" />
        </div>

        <div class="field-card" *ngIf="!isGraduate() && isUniversity() && showProfileField('universityGrade')">
          <label>السنة/الفرقة</label>
          <input formControlName="universityGrade" />
        </div>

        <div class="field-card" *ngIf="isGraduate() && showProfileField('graduatedFrom')">
          <label>تخرج من</label>
          <input formControlName="graduatedFrom" />
        </div>

        <div class="field-card" *ngIf="isGraduate() && showProfileField('graduateJob')">
          <label>الوظيفة الحالية</label>
          <input formControlName="graduateJob" />
        </div>

        <div class="field-card field-wide" *ngIf="!isGraduate() && showProfileField('workDetails')">
          <label>تفاصيل العمل</label>
          <input formControlName="workDetails" />
        </div>
      </div>
    </form>

    <ng-container *ngIf="profileCustomEntries() as customEntries">
      <section class="custom-fields-section" *ngIf="customEntries.length">
        <div class="custom-fields-title">حقول إضافية</div>
        <div class="custom-fields-grid">
          <div class="custom-field-card" *ngFor="let item of customEntries">
            <label>{{ item.label }}</label>
            <ng-container *ngIf="editMode && item.editable">
              <select
                *ngIf="item.fieldType === 'SELECT'; else editableCustomFieldText"
                [(ngModel)]="profileCustomFieldValues[item.fieldKey]"
                [ngModelOptions]="{ standalone: true }"
              >
                <option value="" disabled [hidden]="!!profileCustomFieldValues[item.fieldKey]">اختر القيمة</option>
                <option *ngFor="let option of item.options" [value]="option">{{ customFieldOptionLabel(option) }}</option>
              </select>

              <ng-template #editableCustomFieldText>
                <input
                  type="text"
                  [(ngModel)]="profileCustomFieldValues[item.fieldKey]"
                  [ngModelOptions]="{ standalone: true }"
                />
              </ng-template>
            </ng-container>

            <ng-container *ngIf="editMode && !item.editable">
              <select
                *ngIf="item.fieldType === 'SELECT'; else disabledCustomFieldText"
                [ngModel]="profileCustomFieldValues[item.fieldKey]"
                [ngModelOptions]="{ standalone: true }"
                [disabled]="true"
              >
                <option value="" [hidden]="!!profileCustomFieldValues[item.fieldKey]">بدون قيمة</option>
                <option *ngFor="let option of item.options" [value]="option">{{ customFieldOptionLabel(option) }}</option>
              </select>

              <ng-template #disabledCustomFieldText>
                <input
                  type="text"
                  [ngModel]="profileCustomFieldValues[item.fieldKey]"
                  [ngModelOptions]="{ standalone: true }"
                  [disabled]="true"
                />
              </ng-template>
            </ng-container>

            <ng-container *ngIf="!editMode">
              <div class="custom-field-value">{{ item.value }}</div>
            </ng-container>
          </div>
        </div>
      </section>
    </ng-container>
  </section>
</section>
