<p-toast></p-toast>

<header class="header profile-header">
  <div class="profile-title">
    <h2>👤 My Profile</h2>
  </div>

  <div class="qr-section">
    <qrcode
      *ngIf="qrData"
      [qrdata]="qrData"
      [width]="180"
      [errorCorrectionLevel]="'M'"
      [allowEmptyString]="true">
    </qrcode>
  </div>
</header>

<section class="profile-container">
  <form [formGroup]="profileForm" (ngSubmit)="saveChanges()">
    <div class="form-grid">
      <div>
        <label>Full Name</label>
        <input formControlName="fullName" />
      </div>

      <div>
        <label>Email</label>
        <input formControlName="email" />
      </div>

      <div>
        <label>Phone Number</label>
        <input formControlName="phoneNumber" />
      </div>

      <div *ngIf="!isServant()">
        <label>Guardian’s Phone</label>
        <input formControlName="guardiansPhone" />
      </div>

      <div *ngIf="!isServant()">
        <label>Guardian Relation</label>
        <input formControlName="guardianRelation" />
      </div>


      <div>
        <label>Deacon Family</label>
        <input formControlName="deaconFamily" />
      </div>

      <div>
        <label>Deacon Degree</label>
        <input formControlName="deaconDegree" />
      </div>

      <div>
        <label>Status</label>
        <select formControlName="status">
          <option value="" disabled>Choose Status</option>
          <option value="student">Student</option>
          <option value="graduate">Graduate</option>
        </select>
      </div>

      <div *ngIf="!isGraduate()">
        <label>Study Type</label>
<select formControlName="studyType">
  <option value="" disabled>Select Study Type</option>
  <option *ngIf="!isServant()" value="school">School</option>
  <option value="university">University</option>
</select>

      </div>

<div *ngIf="!isGraduate() && !isServant() && isSchool()">
  <label>School Name</label>
  <input formControlName="schoolName" />
</div>

<div *ngIf="!isGraduate() && !isServant() && isSchool()">
  <label>School Grade</label>
  <input formControlName="schoolGrade" />
</div>


<div *ngIf="!isGraduate() && isUniversity()">
  <label>University Name</label>
  <input formControlName="universityName" />
</div>

<div *ngIf="!isGraduate() && isUniversity()">
  <label>Faculty</label>
  <input formControlName="faculty" />
</div>

<div *ngIf="!isGraduate() && isUniversity()">
  <label>University Grade</label>
  <input formControlName="universityGrade" />
</div>

<div *ngIf="isGraduate()">
  <label>Graduated From</label>
  <input formControlName="graduatedFrom" />
</div>

<div *ngIf="isGraduate()">
  <label>Graduate Job</label>
  <input formControlName="graduateJob" />
</div>


      <div class="wide">
        <label>Work Details</label>
        <input formControlName="workDetails" />
      </div>
    </div>

    <div class="buttons">
      <button type="button" class="edit-btn" (click)="toggleEdit()" *ngIf="!editMode">
        ✏️ Edit Profile
      </button>

      <button type="submit" class="save-btn" *ngIf="editMode">
        💾 Save Changes
      </button>

      <button type="button" class="cancel-btn" (click)="toggleEdit()" *ngIf="editMode">
        ❌ Cancel
      </button>
    </div>
  </form>
</section>
